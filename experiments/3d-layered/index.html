<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Flow-Code — layered 3D call graph</title>
<style>
  :root {
    --bg: #0f1216;
    --fg: #e6e8ec;
    --muted: #8b93a1;
    --accent: #4c9aff;
    --ok: #7dd181;
    --warn: #ffb454;
    --border: #262c36;
    --panel: rgba(23, 27, 34, 0.92);
  }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); font-family: -apple-system, Inter, Segoe UI, Roboto, sans-serif; overflow: hidden; }
  canvas { display: block; }

  /* Left-side detail panel — selection-first. Always present; content swaps
     between empty-state and pinned-state. */
  #panel {
    position: fixed; top: 16px; left: 16px; width: 320px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 18px;
    font-size: 13px; backdrop-filter: blur(8px);
  }
  #panel .empty { color: var(--muted); font-size: 12px; line-height: 1.5; }
  #panel .empty kbd { background: rgba(255,255,255,.08); padding: 1px 5px; border-radius: 3px; color: var(--fg); font-family: ui-monospace, monospace; font-size: 11px; }
  #panel .close {
    position: absolute; top: 8px; right: 10px; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); cursor: pointer; border-radius: 4px; font-size: 16px; line-height: 1;
  }
  #panel .close:hover { background: rgba(255,255,255,.06); color: var(--fg); }
  #panel .qname { font-size: 16px; color: var(--accent); font-weight: 600; letter-spacing: -.005em; padding-right: 24px; }
  #panel .ai-hint {
    display: none;
    font-size: 10px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--warn); margin-bottom: 4px;
  }
  #panel .ai-hint.visible { display: block; animation: aiFade 3s ease-out forwards; }
  @keyframes aiFade { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
  #panel .sub { color: var(--muted); font-size: 11px; margin: 4px 0 10px; font-family: ui-monospace, monospace; word-break: break-all; }
  #panel .desc { margin: 10px 0; line-height: 1.5; }
  #panel .stats { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; font-size: 12px; color: var(--muted); margin-top: 10px; }
  #panel .stats b { color: var(--fg); }
  #panel .cones { margin-top: 10px; font-size: 11px; }
  #panel .cones span { display: inline-block; padding: 2px 7px; border-radius: 10px; margin-right: 4px; }
  #panel .up { background: rgba(125,209,129,.18); color: var(--ok); }
  #panel .down { background: rgba(255,180,84,.18); color: var(--warn); }
  #panel .actions { margin-top: 14px; display: flex; gap: 8px; }
  #panel button {
    background: var(--accent); color: white; border: none;
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 500;
  }
  #panel button:hover { filter: brightness(1.1); }
  #panel button:disabled { opacity: 0.55; cursor: wait; }
  #panel button.copied { background: var(--ok); }

  /* Labeling progress — shimmer-filled bar under the action buttons. */
  .labeling-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; font-size: 11px; }
  .labeling-text { color: #cfd3da; }
  .labeling-eta { color: #8b93a1; font-variant-numeric: tabular-nums; }
  .labeling-track { height: 3px; background: rgba(76,154,255,.12); border-radius: 2px; overflow: hidden; position: relative; }
  .labeling-fill {
    position: absolute; top: 0; left: 0; bottom: 0; width: 0%;
    background: linear-gradient(90deg, rgba(76,154,255,.75), rgba(125,209,129,.75));
    transition: width 0.25s linear;
  }
  .labeling-fill::after {
    /* shimmering highlight that slides across whatever is currently filled */
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.45), transparent);
    background-size: 40% 100%; background-repeat: no-repeat;
    animation: labelShimmer 1.4s linear infinite;
  }
  /* Indeterminate state: full-width track with a traveling band, used while
     we wait for the user's AI to pick up the queued request. */
  .labeling-fill-indeterminate {
    width: 100%;
    background: linear-gradient(90deg,
      rgba(76,154,255,.0) 0%,
      rgba(76,154,255,.55) 40%,
      rgba(125,209,129,.55) 60%,
      rgba(76,154,255,.0) 100%);
    background-size: 35% 100%;
    background-repeat: no-repeat;
    animation: labelIndeterminate 1.6s linear infinite;
  }
  @keyframes labelShimmer {
    from { background-position: -40% 0; }
    to   { background-position: 140% 0; }
  }
  @keyframes labelIndeterminate {
    from { background-position: -35% 0; }
    to   { background-position: 135% 0; }
  }

  /* Cursor-following hover tooltip — single line qname. */
  #tooltip {
    position: fixed; pointer-events: none;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 9px;
    font-size: 12px; color: var(--fg); font-family: ui-monospace, monospace;
    backdrop-filter: blur(6px);
    display: none;
    transform: translate(12px, 12px);
    z-index: 10;
  }
  #tooltip.visible { display: block; }

  /* Gear (top-right) + collapsible controls drawer. */
  #gear {
    position: fixed; top: 16px; right: 16px;
    width: 34px; height: 34px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 16px;
    backdrop-filter: blur(8px);
  }
  #gear:hover { color: var(--fg); }
  #controls {
    position: fixed; top: 58px; right: 16px; width: 220px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    font-size: 12px; backdrop-filter: blur(8px);
    display: none;
  }
  #controls.visible { display: block; }
  #controls .label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 6px; }
  #controls label { display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--fg); margin-bottom: 4px; }
  #controls input { margin: 0; }

  /* Bottom-right help hint. */
  #hint {
    position: fixed; bottom: 12px; right: 14px;
    font-size: 11px; color: var(--muted);
    pointer-events: none;
  }
  #hint kbd { background: rgba(255,255,255,.06); padding: 1px 4px; border-radius: 3px; color: var(--muted); font-family: ui-monospace, monospace; font-size: 10px; }
</style>
</head>
<body>

<div id="panel">
  <div class="empty" id="panel-empty">
    Click a node on the mountain to pin it.<br><br>
    <kbd>drag</kbd> orbit · <kbd>scroll</kbd> zoom · <kbd>hover</kbd> preview
  </div>
  <div class="pinned" id="panel-pinned" style="display:none">
    <div class="close" id="panel-close" title="Unpin">×</div>
    <div class="ai-hint" id="ai-hint">AI pinned this</div>
    <div class="qname" id="i-qname">—</div>
    <div class="sub" id="i-sub">—</div>
    <div class="desc" id="i-desc"></div>
    <div class="stats" id="i-stats"></div>
    <div class="cones" id="i-cones"></div>
    <div class="actions">
      <button id="copy-ref">Copy ref</button>
      <button id="label-node" title="Ask AI to write a plain-English name + description for this function">Label node</button>
      <button id="label-branch" title="Ask AI to label this function and everything it calls">Label branch</button>
    </div>
    <div id="label-status" style="margin-top:10px;font-size:11px;color:#8b93a1;display:none"></div>
  </div>
</div>

<div id="tooltip"></div>

<div id="gear" title="Settings">⚙</div>
<div id="controls">
  <div class="label">Layout</div>
  <label><input type="radio" name="layout" value="fan" checked> Ski slope (fan)</label>
  <label><input type="radio" name="layout" value="umap"> Pure embedding</label>
  <div class="label" style="margin-top:8px">Intro</div>
  <button id="replay-intro" type="button" style="background:transparent;border:1px solid #2d3a4d;color:#8b93a1;padding:4px 8px;border-radius:4px;font:inherit;cursor:pointer">Replay</button>
</div>

<div id="hint"><kbd>click</kbd> pin · <kbd>esc</kbd> unpin</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
  const v = new URL(location.href).searchParams.get('v') || Date.now();
  import(`./app.js?v=${v}`);
</script>
</body>
</html>
